basePath: /
info:
  contact: {}
  description: HTTP API that queues Whisper-style audio transcription jobs via Redis.
    Versioned routes live under `/api/v1/...`.
  title: Whisper Fiber API
  version: "1.0"
paths:
  /:
    get:
      description: '**GET** returns query parameters as a JSON object, or `{}` if
        empty. **Other methods** (POST, etc.) return the request body; when the body
        is non-empty, the original `Content-Type` is echoed back.'
      produces:
      - application/json
      responses:
        "200":
          description: 'GET: query keys and values'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Echo request
      tags:
      - debug
  /api/v1/transcribe:
    post:
      consumes:
      - multipart/form-data
      description: Accepts an audio file in the multipart form field `audio`, generates
        a `task_id` (UUID), and enqueues the job. Use WAV/MP3 or other formats supported
        by your downstream pipeline.
      parameters:
      - description: Audio file (e.g. wav/mp3)
        in: formData
        name: audio
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: JSON body includes task_id
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Missing audio field or invalid multipart form
          schema:
            type: string
        "500":
          description: Failed to read the uploaded file or enqueue the job
          schema:
            type: string
      summary: Speech-to-text enqueue
      tags:
      - audio
  /health:
    get:
      description: Returns an aggregated dependency status (e.g. `redis_status`).
        Responds with HTTP 503 when Redis is unavailable.
      produces:
      - application/json
      responses:
        "200":
          description: All checks passed
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service temporarily unavailable
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - system
swagger: "2.0"
