basePath: /
info:
  contact: {}
  description: HTTP API that queues Whisper-style audio transcription jobs via Redis.
    Versioned routes live under `/api/v1/...`.
  title: Whisper Fiber API
  version: "1.0"
paths:
  /:
    get:
      description: Returns **`text/plain`**. If the request has a body, it is echoed
        as-is. If the body is empty, the query **`q`** is echoed when present; otherwise
        the response body is empty (HTTP 200, no error).
      parameters:
      - description: String to echo when the request body is empty (Try it out on
          GET)
        in: query
        name: q
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: Request body bytes, or q, or empty
          schema:
            type: string
      summary: Echo string
      tags:
      - debug
  /api/v1/transcribe:
    post:
      consumes:
      - multipart/form-data
      description: Accepts an audio file in the multipart form field `audio`, generates
        a `task_id` (UUID), and enqueues the job. Use WAV/MP3 or other formats supported
        by your downstream pipeline.
      parameters:
      - description: Audio file (e.g. wav/mp3)
        in: formData
        name: audio
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: JSON body includes task_id
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Missing audio field or invalid multipart form
          schema:
            type: string
        "500":
          description: Failed to read the uploaded file or enqueue the job
          schema:
            type: string
      summary: Speech-to-text enqueue
      tags:
      - audio
  /health:
    get:
      description: Returns an aggregated dependency status (e.g. `redis_status`).
        Responds with HTTP 503 when Redis is unavailable.
      produces:
      - application/json
      responses:
        "200":
          description: All checks passed
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service temporarily unavailable
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - system
swagger: "2.0"
